delimiter: ","

aliases:
  # общие
  "UID": uid
  "User UID": user_uid
  "Opponent UID": opponent_uid
  "Status": status
  "Crypto": crypto
  "Direction": direction
  "Quantity": quantity
  "Network": network
  "Price": price
  "Fee": fee
  "Amount": amount
  "Role": role

  # время (унифицируем к snake_case без часовых поясов)
  "Creation Time(UTC+03:00)": creation_time
  "Creation Time (UTC+03:00)": creation_time # возможный вариант с пробелом
  "Start Time(UTC+03:00)": start_time
  "End Time(UTC+03:00)": end_time
  "Time(UTC+03:00)": time
  "Time": time
  "create_time(UTC+03:00)": create_time
  "close_time(UTC+03:00)": close_time

  # Earn / Spot / Otc
  "Transaction Type": tx_type

  # P2P
  "P2P Type": p2p_type
  "Trading Token": trading_token
  "Trading Direction": trading_direction
  "Order Quantity": order_qty
  "Settlement Token": settlement_token
  "Order Amount": order_amount

  # Deposits
  "Deposit Amount": deposit_amount
  "TxID": txid
  "TxId": txid # частый кейс-микс
  "Progress": progress

  # Withdrawals
  "Request Amount": request_amount
  "Withdrawal Address": withdrawal_address
  "Trading Fee": trading_fee
  "Settlement Amount": settlement_amount
  "Withdrawal Descriptions": withdrawal_descriptions

  # Futures copy-trade orders
  "copy_trader_uid": copy_trader_uid
  "copy_state": copy_state
  "futures": futures
  "used_margin": used_margin
  "leverage": leverage
  "open_type": open_type
  "vol(Cont)": vol_cont
  "vol(Cont.)": vol_cont # вариант с точкой
  "copy_amount(USDT)": copy_amount_usdt
  "deal_avg_price": deal_avg_price
  "close_avg_price": close_avg_price
  "Position Profit/Loss(USDT)": position_pnl_usdt

  # Futures capital flow
  "Futures Trading Pair": futures_trading_pair
  "Fund Type": fund_type
  "Fund Flow Type": fund_flow_type

  # Futures trades
  "Order Type": order_type
  "Filled Qty (Cont.)": filled_qty_cont
  "Filled Qty (Cont)": filled_qty_cont # без точки
  "Filled Qty (Crypto)": filled_qty_crypto
  "Filled Qty (Amount)": filled_qty_amount
  "Filled Price": filled_price
  "Fee-payment Crypto": fee_payment_crypto
  "Closing PNL": closing_pnl

factories:
  - type: EarnFixedFactory
    required_headers:
      - uid
      - creation_time
      - crypto
      - tx_type
      - direction
      - quantity

  - type: EarnFlexibleFactory
    required_headers:
      - uid
      - creation_time
      - crypto
      - tx_type
      - direction
      - quantity

  - type: FiatP2POrdersFactory
    required_headers:
      - uid
      - p2p_type
      - user_uid
      - opponent_uid
      - start_time
      - end_time
      - trading_token
      - trading_direction
      - status
      - order_qty
      - price
      - fee
      - settlement_token
      - order_amount

  - type: FiatOtcFactory
    required_headers:
      - uid
      - creation_time
      - crypto
      - tx_type
      - direction
      - quantity

  - type: DepositsFactory
    required_headers:
      - uid
      - status
      - time
      - crypto
      - network
      - deposit_amount
      - txid
      - progress

  - type: WithdrawalsFactory
    required_headers:
      - uid
      - status
      - time
      - crypto
      - network
      - request_amount
      - withdrawal_address
      - txid
      - trading_fee
      - settlement_amount
      - withdrawal_descriptions

  - type: FuturesCopyTradeOrdersFactory
    required_headers:
      - uid
      - copy_trader_uid
      - copy_state
      - futures
      - used_margin
      - leverage
      - open_type
      - vol_cont
      - copy_amount_usdt
      - deal_avg_price
      - close_avg_price
      - position_pnl_usdt
      - fee
      - create_time
      - close_time

  - type: FuturesCapitalFlowFactory
    required_headers:
      - uid
      - time
      - futures_trading_pair
      - crypto
      - fund_type
      - fund_flow_type
      - amount

  - type: FuturesTradesFactory
    required_headers:
      - uid
      - time
      - futures_trading_pair
      - direction
      - order_type
      - filled_qty_cont
      - filled_qty_crypto
      - filled_qty_amount
      - filled_price
      - trading_fee
      - fee_payment_crypto
      - role
      - closing_pnl

  - type: SpotStatementFactory
    required_headers:
      - uid
      - creation_time
      - crypto
      - tx_type
      - direction
      - quantity

  - type: SpotTradesFactory
    required_headers:
      - uid
      - creation_time
      - crypto
      - tx_type
      - direction
      - quantity
